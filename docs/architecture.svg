<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" fill="none">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Hardware box -->
  <rect x="10" y="60" width="180" height="140" rx="10" fill="#0d1117" stroke="#00bfff" stroke-width="1.5"/>
  <text x="100" y="90" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">HARDWARE</text>
  <rect x="30" y="105" width="140" height="75" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="100" y="130" text-anchor="middle" fill="#e6edf3" font-size="12">OpenBCI</text>
  <text x="100" y="148" text-anchor="middle" fill="#e6edf3" font-size="12">Cyton Board</text>
  <text x="100" y="166" text-anchor="middle" fill="#8b949e" font-size="11">(8ch EMG)</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="130" x2="270" y2="130" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="122" text-anchor="middle" fill="#8b949e" font-size="10">USB</text>

  <!-- Backend box -->
  <rect x="270" y="30" width="200" height="200" rx="10" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="370" y="58" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">BACKEND</text>
  <rect x="295" y="72" width="150" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="370" y="98" text-anchor="middle" fill="#e6edf3" font-size="12">KYMA Server</text>
  <text x="370" y="118" text-anchor="middle" fill="#8b949e" font-size="11">(FastAPI)</text>

  <!-- Arrow to Frontend -->
  <line x1="470" y1="102" x2="540" y2="168" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="520" y="125" text-anchor="middle" fill="#8b949e" font-size="10">WebSocket</text>

  <!-- Arrow from Frontend back -->
  <line x1="540" y1="195" x2="470" y2="140" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="520" y="180" text-anchor="middle" fill="#8b949e" font-size="10">REST API</text>

  <!-- Arrow to Output -->
  <line x1="470" y1="85" x2="540" y2="60" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="515" y="62" text-anchor="middle" fill="#8b949e" font-size="10">Serial</text>

  <!-- Frontend box -->
  <rect x="540" y="140" width="200" height="110" rx="10" fill="#0d1117" stroke="#e94560" stroke-width="1.5"/>
  <text x="640" y="167" text-anchor="middle" fill="#e94560" font-size="11" font-weight="600">FRONTEND</text>
  <rect x="565" y="180" width="150" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="640" y="200" text-anchor="middle" fill="#e6edf3" font-size="12">Dashboard</text>
  <text x="640" y="218" text-anchor="middle" fill="#8b949e" font-size="11">3D Arm / Charts / Block Editor</text>

  <!-- Output box -->
  <rect x="540" y="10" width="200" height="110" rx="10" fill="#0d1117" stroke="#00bfff" stroke-width="1.5"/>
  <text x="640" y="37" text-anchor="middle" fill="#00bfff" font-size="11" font-weight="600">OUTPUT</text>
  <rect x="565" y="48" width="150" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="640" y="68" text-anchor="middle" fill="#e6edf3" font-size="12">Arduino</text>
  <text x="640" y="86" text-anchor="middle" fill="#8b949e" font-size="11">Robot Arm / Servo Array</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#484f58"/>
    </marker>
  </defs>
</svg>